<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simba Apparel EPZ Ltd. — Digital Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter', sans-serif;
    background:#050505;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  .card {
    width:100%;
    max-width:420px;
    background:#0E0E0E;
    border:1px solid #2A2A2A;
    border-radius:6px;
    padding:44px 36px 32px;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
  }
  .brand {
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:30px;
    line-height:1.15;
    color:#D4AF37;
    letter-spacing:0.3px;
  }
  .brand-rule {
    height:2px;
    background:#D4AF37;
    width:64px;
    margin-top:14px;
  }
  .division {
    font-family:'Inter', sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:#8C8C8C;
    margin-top:10px;
  }
  .divider {
    height:1px;
    background:#262626;
    margin:30px 0 26px;
  }
  .name {
    font-family:'Inter', sans-serif;
    font-size:18px;
    font-weight:600;
    color:#F2F2F2;
    letter-spacing:0.2px;
  }
  .role {
    font-family:'Inter', sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#D4AF37;
    margin-top:5px;
  }
  .contacts {
    margin-top:28px;
    font-size:14px;
    color:#CFCFCF;
    line-height:2.1;
  }
  .contacts .row {
    display:flex;
  }
  .contacts .label {
    width:54px;
    color:#6E6E6E;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding-top:3px;
  }
  .contacts a {
    color:#EDEDED;
    text-decoration:none;
    font-weight:500;
  }
  .contacts a:hover { color:#D4AF37; }
  .actions {
    display:flex;
    gap:10px;
    margin-top:26px;
  }
  .btn {
    flex:1;
    text-align:center;
    padding:13px 0;
    font-family:'Inter', sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:1.2px;
    text-transform:uppercase;
    text-decoration:none;
    border-radius:3px;
    transition:opacity .15s ease;
  }
  .btn:hover { opacity:0.85; }
  .btn.call {
    background:#D4AF37;
    color:#0E0E0E;
  }
  .btn.mail {
    background:transparent;
    border:1px solid #D4AF37;
    color:#D4AF37;
  }
  .footer {
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid #262626;
    font-size:11.5px;
    color:#6E6E6E;
    line-height:1.8;
    letter-spacing:0.3px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Simba Apparel<br>EPZ Ltd.</div>
    <div class="brand-rule"></div>
    <div class="division">Export Processing Zone</div>

    <div class="divider"></div>

    <div class="name">Janardanan Myliyat <span style="color:#6E6E6E;font-weight:400;">(JD)</span></div>
    <div class="role">Director</div>

    <div class="contacts">
      <div class="row"><span class="label">Tel</span><a href="tel:+254731233675">+254 731 233675</a></div>
      <div class="row"><span class="label">Mob</span><a href="tel:+254707949977">+254 707 949977</a></div>
      <div class="row"><span class="label">P</span><a href="tel:+254733888573">+254 733 888573</a></div>
      <div class="row"><span class="label">Email</span><a href="mailto:jd@simbaepz.com">jd@simbaepz.com</a></div>
    </div>

    <div class="actions">
      <a class="btn call" href="tel:+254707949977">Call</a>
      <a class="btn mail" href="mailto:jd@simbaepz.com">Email</a>
    </div>

    <div class="footer">
      P.O. Box 93577 – 80102, Refinery Road, Changamwe<br>
      Mombasa, Kenya
    </div>
  </div>
</body>
</html>

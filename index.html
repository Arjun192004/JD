<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simba Apparel EPZ Ltd. — Digital Card</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #e9e6e0;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding: 20px;
  }
  .card {
    background:#ffffff;
    width:100%;
    max-width:420px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .card-top {
    padding:28px 24px 20px;
  }
  .emblem {
    width:70px;
    height:70px;
    margin-bottom:14px;
  }
  .company {
    font-size:26px;
    font-weight:bold;
    color:#1B2A4A;
    letter-spacing:0.5px;
    line-height:1.2;
  }
  .division {
    font-family: Arial, Helvetica, sans-serif;
    font-size:15px;
    font-weight:bold;
    color:#222;
    margin-top:4px;
  }
  .divider {
    height:1px;
    background:#ddd;
    margin:18px 0;
  }
  .name {
    font-family: Arial, Helvetica, sans-serif;
    font-size:19px;
    font-weight:bold;
    color:#111;
  }
  .role {
    font-family: Arial, Helvetica, sans-serif;
    font-size:16px;
    color:#333;
    margin-top:2px;
  }
  .contacts {
    font-family: Arial, Helvetica, sans-serif;
    margin-top:20px;
    font-size:15px;
    color:#222;
    line-height:1.9;
  }
  .contacts a {
    color:#1B2A4A;
    text-decoration:none;
    font-weight:bold;
  }
  .contacts .label {
    color:#777;
    font-weight:normal;
    display:inline-block;
    width:50px;
  }
  .actions {
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  .btn {
    flex:1;
    text-align:center;
    padding:12px 0;
    border-radius:8px;
    font-family: Arial, sans-serif;
    font-size:14px;
    font-weight:bold;
    text-decoration:none;
    color:#fff;
  }
  .btn.call { background:#1B2A4A; }
  .btn.mail { background:#C49A3C; }
  .footer {
    background:#3a3a3a;
    color:#d9a83b;
    font-family: Arial, Helvetica, sans-serif;
    font-size:13px;
    text-align:center;
    padding:16px 20px;
    line-height:1.6;
  }
</style>
</head>
